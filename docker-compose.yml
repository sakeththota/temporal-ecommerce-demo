services:
  postgresql:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotel_booking
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    depends_on:
      postgresql:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - temporal

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["sh", "-c", "ollama pull all-minilm && ollama pull nomic-embed-text"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: on-failure:3

  search:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: search
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgresql:5432/hotel_booking?sslmode=disable
      TEMPORAL_ADDRESS: temporal:7233
      OLLAMA_URL: http://ollama:11434
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: postgres://postgres:postgres@postgresql:5432/hotel_booking?sslmode=disable
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c", "goose -dir=/app/migrations up && /app/bin/search seed && exec /app/bin/search"]
    restart: unless-stopped

  booking:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: booking
    ports:
      - "8081:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgresql:5432/hotel_booking?sslmode=disable
      TEMPORAL_ADDRESS: temporal:7233
      OLLAMA_URL: http://ollama:11434
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://api.yourdomain.com
        - NEXT_PUBLIC_BOOKING_API_URL=https://booking.yourdomain.com
    ports:
      - "3000:3000"
    depends_on:
      - search

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/Caddyfile
      - caddy_data:/data
    depends_on:
      - search
      - booking
      - frontend
      - temporal-ui
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
  caddy_data:
